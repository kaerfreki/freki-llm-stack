apiVersion: apps/v1
kind: Deployment
metadata:
  name: comfyui
  labels:
    app.kubernetes.io/name: comfyui
    app.kubernetes.io/part-of: freki-llm-stack
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: comfyui
  template:
    metadata:
      labels:
        app.kubernetes.io/name: comfyui
        app.kubernetes.io/part-of: freki-llm-stack
    spec:
      # runtimeClassName: nvidia
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      containers:
        - name: comfyui
          # Same pin as compose/comfyui (digest; no versioned releases).
          image: yanwk/comfyui-boot:cu130-slim-v2@sha256:1f36e6aece5aaf938c62b9a62171382c6a1a1377f318805e5b51030ae027e3b1
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8188
          resources:
            requests:
              cpu: "1"
              memory: 8Gi
              nvidia.com/gpu: "1"
            limits:
              memory: 48Gi
              nvidia.com/gpu: "1"
          volumeMounts:
            - name: models
              mountPath: /root/ComfyUI/models
            - name: output
              mountPath: /root/ComfyUI/output
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 20
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: comfyui-models
        - name: output
          persistentVolumeClaim:
            claimName: comfyui-output
